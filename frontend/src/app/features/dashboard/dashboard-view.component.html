<section class="kpi-grid">
  @for (kpi of dashboard.kpis; track kpi.label) {
    <app-kpi-card [kpi]="kpi" />
  }
</section>

<section class="dashboard-grid">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Fluxo SD</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <app-workflow-chart [stages]="dashboard.workflow" />
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Alertas operacionais</mat-card-title>
    </mat-card-header>
    <mat-card-content class="alerts">
      @for (alert of dashboard.alerts; track alert.title) {
        <article [ngClass]="alert.severity.toLowerCase()">
          <span>{{ alert.severity }}</span>
          <strong>{{ alert.title }}</strong>
          <small>{{ alert.detail }}</small>
        </article>
      }
    </mat-card-content>
  </mat-card>
</section>
