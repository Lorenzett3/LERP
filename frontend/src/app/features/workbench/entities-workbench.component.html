<section class="workbench">
  <div class="toolbar">
    <app-action-button icon="add" label="Incluir entidade" (pressed)="createClicked.emit()" />
  </div>

  <app-erp-grid
    title="Clientes e funcionários"
    eyebrow="Parceiros ERP"
    [rows]="entities"
    [columns]="columns"
    (viewRow)="viewClicked.emit($event)"
    (editRow)="editClicked.emit($event)"
    (deleteRow)="deleteClicked.emit($event)"
  />
</section>
