<section class="workbench">
  <div class="toolbar">
    <app-action-button icon="add" label="Incluir material" (pressed)="createClicked.emit()" />
  </div>

  <app-erp-grid
    title="Materiais cadastrados"
    eyebrow="Módulo MM"
    [rows]="products"
    [columns]="columns"
    (viewRow)="viewClicked.emit($event)"
    (editRow)="editClicked.emit($event)"
    (deleteRow)="deleteClicked.emit($event)"
  />
</section>
