<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>SKU</mat-label>
      <input matInput formControlName="sku" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Categoria</mat-label>
      <input matInput formControlName="category" />
    </mat-form-field>
    <div class="inline-fields">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Preço</mat-label>
        <input matInput type="number" formControlName="price" />
      </mat-form-field>
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Estoque</mat-label>
        <input matInput type="number" formControlName="stock" />
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="dialog-cancel-button" mat-button mat-dialog-close type="button">{{ isViewMode ? 'Voltar' : 'Cancelar' }}</button>
  <button class="dialog-save-button" mat-flat-button type="button" [disabled]="isViewMode" (click)="save()">Salvar</button>
</mat-dialog-actions>
