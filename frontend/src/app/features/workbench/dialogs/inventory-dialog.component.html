<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>SKU</mat-label>
      <input matInput formControlName="productSku" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="type">
        <mat-option value="INBOUND">INBOUND</mat-option>
        <mat-option value="OUTBOUND">OUTBOUND</mat-option>
        <mat-option value="ADJUSTMENT">ADJUSTMENT</mat-option>
      </mat-select>
    </mat-form-field>
    <div class="inline-fields">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Quantidade</mat-label>
        <input matInput type="number" formControlName="quantity" />
      </mat-form-field>
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Referência</mat-label>
        <input matInput formControlName="reference" />
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">{{ isViewMode ? 'Voltar' : 'Cancelar' }}</button>
  <button mat-flat-button color="primary" type="button" [disabled]="isViewMode" (click)="save()">Salvar</button>
</mat-dialog-actions>
