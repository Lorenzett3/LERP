<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>SKU</mat-label>
      <input matInput formControlName="productSku" />
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="type">
        <mat-option value="INBOUND">Entrada</mat-option>
        <mat-option value="OUTBOUND">Saída</mat-option>
        <mat-option value="ADJUSTMENT">Ajuste</mat-option>
      </mat-select>
    </mat-form-field>
    <div class="inline-fields">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Quantidade</mat-label>
        <input matInput type="number" formControlName="quantity" />
      </mat-form-field>
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Referência</mat-label>
        <input matInput formControlName="reference" />
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="dialog-cancel-button" mat-button mat-dialog-close type="button">{{ isViewMode ? 'Voltar' : 'Cancelar' }}</button>
  <button class="dialog-save-button" mat-flat-button type="button" [disabled]="isViewMode" (click)="save()">Salvar</button>
</mat-dialog-actions>
