<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">L</span>
      <div>
        <strong>LERP</strong>
      </div>
    </div>

    <div class="nav-area">
      <div class="user-profile">
        <button
          class="user-profile-button"
          type="button"
          [matMenuTriggerFor]="userMenu"
          [attr.aria-label]="'Usuário demo: ' + selectedUserLabel"
          [title]="selectedUserLabel"
        >
          <span class="user-avatar">
            <mat-icon>account_circle</mat-icon>
          </span>
          <span class="user-profile-copy">
            <strong>{{ selectedUserCode }}</strong>
            <small>{{ selectedUserRole }}</small>
          </span>
          <mat-icon class="user-chevron">expand_more</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" xPosition="after">
          @for (user of demoUsers; track user.value) {
            <button mat-menu-item type="button" (click)="selectedUserChange.emit(user.value)">
              <mat-icon>{{ selectedUser === user.value ? 'check' : 'person' }}</mat-icon>
              <span>{{ user.label }}</span>
            </button>
          }
        </mat-menu>
      </div>

      <nav aria-label="Módulos ERP">
        @for (item of navItems; track item.label) {
          <button type="button" [class.active]="activeModule === item.label" (click)="moduleChanged.emit(item.label)">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </button>
        }
      </nav>
    </div>

    <div class="client-box">
      <span>Mandante {{ dashboard.client }}</span>
      <strong>{{ dashboard.companyCode }} / {{ dashboard.plant }}</strong>
    </div>
  </aside>

  <main>
    <header class="topbar">
      <div class="title-group">
        <h1>{{ activeModule }}</h1>
      </div>

      <div class="session">
        <app-action-button icon="refresh" label="Atualizar" (pressed)="refresh.emit()" />
      </div>
    </header>

    <section class="content">
      <ng-content />
    </section>
  </main>
</div>
